<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center">Manage Orders</h2>
        <form id="orderForm">
            <div class="form-group">
                <label for="orderId">Order ID</label>
                <input type="number" class="form-control" id="orderId" required>
            </div>
            <div class="form-group">
                <label for="userId">User ID</label>
                <input type="number" class="form-control" id="userId" required>
            </div>
            <div class="form-group">
                <label for="orderDate">Order Date</label>
                <input type="datetime-local" class="form-control" id="orderDate" required>
            </div>
            <div class="form-group">
                <label for="totalAmount">Total Amount</label>
                <input type="number" class="form-control" id="totalAmount" required>
            </div>
            <div class="form-group">
                <label for="paymentStatus">Payment Status</label>
                <input type="text" class="form-control" id="paymentStatus" required>
            </div>
            <button type="submit" class="btn btn-primary">Add Order</button>
            <button type="button" class="btn btn-secondary" id="updateOrderBtn">Update Order</button>
            <button type="button" class="btn btn-danger" id="deleteOrderBtn">Delete Order</button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const orderForm = document.getElementById('orderForm');
            const updateOrderBtn = document.getElementById('updateOrderBtn');
            const deleteOrderBtn = document.getElementById('deleteOrderBtn');

            orderForm.addEventListener('submit', (e) => {
                e.preventDefault();

                const orderId = document.getElementById('orderId').value;
                const userId = document.getElementById('userId').value;
                const orderDate = document.getElementById('orderDate').value.replace('T', ' ') + ':00';
                const totalAmount = document.getElementById('totalAmount').value;
                const paymentStatus = document.getElementById('paymentStatus').value;

                fetch('/api/orders', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        order_id: orderId,
                        user_id: userId,
                        order_date: orderDate,
                        total_amount: totalAmount,
                        payment_status: paymentStatus
                    })
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    alert('Order added successfully!');
                    // Optionally, clear the form fields or refresh the order list
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Failed to add order. Please check the console for more details.');
                });
            });

            updateOrderBtn.addEventListener('click', () => {
                const orderId = document.getElementById('orderId').value;
                const userId = document.getElementById('userId').value;
                const orderDate = document.getElementById('orderDate').value.replace('T', ' ') + ':00';
                const totalAmount = document.getElementById('totalAmount').value;
                const paymentStatus = document.getElementById('paymentStatus').value;

                fetch(`/api/orders/${orderId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        user_id: userId,
                        order_date: orderDate,
                        total_amount: totalAmount,
                        payment_status: paymentStatus
                    })
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    alert('Order updated successfully!');
                    // Optionally, clear the form fields or refresh the order list
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Failed to update order. Please check the console for more details.');
                });
            });

            deleteOrderBtn.addEventListener('click', () => {
                const orderId = document.getElementById('orderId').value;

                fetch(`/api/orders/${orderId}`, {
                    method: 'DELETE'
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    alert('Order deleted successfully!');
                    // Optionally, clear the form fields or refresh the order list
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Failed to delete order. Please check the console for more details.');
                });
            });
        });
    </script>
</body>
</html>
