<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Venues</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center">Manage Venues</h2>
        <form id="venueForm">
            <div class="form-group">
                <label for="venueId">Venue ID</label>
                <input type="number" class="form-control" id="venueId" required>
            </div>
            <div class="form-group">
                <label for="venueName">Venue Name</label>
                <input type="text" class="form-control" id="venueName" required>
            </div>
            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" class="form-control" id="address" required>
            </div>
            <div class="form-group">
                <label for="city">City</label>
                <input type="text" class="form-control" id="city" required>
            </div>
            <div class="form-group">
                <label for="state">State</label>
                <input type="text" class="form-control" id="state" required>
            </div>
            <div class="form-group">
                <label for="zipCode">Zip Code</label>
                <input type="text" class="form-control" id="zipCode" required>
            </div>
            <div class="form-group">
                <label for="capacity">Capacity</label>
                <input type="number" class="form-control" id="capacity" required>
            </div>
            <button type="submit" class="btn btn-primary">Add Venue</button>
            <button type="button" class="btn btn-secondary" id="updateVenueBtn">Update Venue</button>
            <button type="button" class="btn btn-danger" id="deleteVenueBtn">Delete Venue</button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const venueForm = document.getElementById('venueForm');
            const updateVenueBtn = document.getElementById('updateVenueBtn');
            const deleteVenueBtn = document.getElementById('deleteVenueBtn');

            venueForm.addEventListener('submit', (e) => {
                e.preventDefault();

                const venueId = document.getElementById('venueId').value;
                const venueName = document.getElementById('venueName').value;
                const address = document.getElementById('address').value;
                const city = document.getElementById('city').value;
                const state = document.getElementById('state').value;
                const zipCode = document.getElementById('zipCode').value;
                const capacity = document.getElementById('capacity').value;

                fetch('/api/venues', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        venue_id: venueId,
                        venue_name: venueName,
                        address: address,
                        city: city,
                        state: state,
                        zip_code: zipCode,
                        capacity: capacity
                    })
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    alert('Venue added successfully!');
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Failed to add venue. Please check the console for more details.');
                });
            });

            updateVenueBtn.addEventListener('click', () => {
                const venueId = document.getElementById('venueId').value;
                const venueName = document.getElementById('venueName').value;
                const address = document.getElementById('address').value;
                const city = document.getElementById('city').value;
                const state = document.getElementById('state').value;
                const zipCode = document.getElementById('zipCode').value;
                const capacity = document.getElementById('capacity').value;

                fetch(`/api/venues/${venueId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        venue_name: venueName,
                        address: address,
                        city: city,
                        state: state,
                        zip_code: zipCode,
                        capacity: capacity
                    })
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    alert('Venue updated successfully!');
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Failed to update venue. Please check the console for more details.');
                });
            });

            deleteVenueBtn.addEventListener('click', () => {
                const venueId = document.getElementById('venueId').value;

                fetch(`/api/venues/${venueId}`, {
                    method: 'DELETE'
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    alert('Venue deleted successfully!');
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Failed to delete venue. Please check the console for more details.');
                });
            });
        });
    </script>
</body>
</html>
